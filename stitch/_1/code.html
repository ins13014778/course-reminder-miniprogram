<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Course Reminder - Home</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-xl overflow-x-hidden">
<!-- Top Bar -->
<div class="flex items-center justify-between p-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBU-pdyOQsTn33KxSCnGW43RTcvH90mhZDMwCjaHnX4c0lLUYWGx0qEcv5frPTCwvJCMrdIXeD7vku7840zCIoSGATBBKtOL5Lg6rQfaZGLeZMApbkk8wa_t-VQ8PGIiHZet0oBysvWD1X-00YzkoMeIt4RAQdYtsbO3dOUrW5UdOv2mZXDa7Z01teI4Xg-Bm7CQnJQkQMCWCS1zWlrhXxJM9Y7qgfP18KQGZZGFwEglt1igCN3kjzEnSjJEuDn2qmDXswCTf7O1ZdS"/>
</div>
<div class="flex flex-col">
<h1 class="text-sm font-medium text-slate-500 dark:text-slate-400">欢迎回来，</h1>
<p class="text-lg font-bold leading-tight">Alex Zhang</p>
</div>
</div>
<button class="relative p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-2 right-2 flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
</button>
</div>
<main class="flex-1 px-4 py-2 space-y-6">
<!-- Date Display -->
<div class="flex flex-col gap-1">
<p class="text-primary font-semibold text-sm uppercase tracking-wider">今日日程</p>
<p class="text-2xl font-bold">Monday, Oct 23rd</p>
</div>
<!-- Quick View: Today's Schedule -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-lg font-bold">今日课程表</h2>
<span class="text-xs font-medium px-2.5 py-1 bg-primary/10 text-primary rounded-full">3 Classes Today</span>
</div>
<!-- Class Card 1 -->
<div class="flex items-stretch gap-4 rounded-xl bg-white dark:bg-slate-900 p-4 border border-slate-200 dark:border-slate-800 shadow-sm">
<div class="flex flex-col items-center justify-center border-r border-slate-100 dark:border-slate-800 pr-4 min-w-[70px]">
<span class="text-primary font-bold text-lg leading-none">08:00</span>
<span class="text-slate-400 text-xs mt-1">09:35</span>
</div>
<div class="flex flex-col justify-center flex-1">
<p class="text-slate-900 dark:text-white font-bold text-base">计算机网络</p>
<div class="flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[16px] text-slate-400">location_on</span>
<p class="text-slate-500 dark:text-slate-400 text-sm">Classroom 302 • Building B</p>
</div>
</div>
</div>
<!-- Class Card 2 -->
<div class="flex items-stretch gap-4 rounded-xl bg-white dark:bg-slate-900 p-4 border border-slate-200 dark:border-slate-800 shadow-sm">
<div class="flex flex-col items-center justify-center border-r border-slate-100 dark:border-slate-800 pr-4 min-w-[70px]">
<span class="text-primary font-bold text-lg leading-none">10:10</span>
<span class="text-slate-400 text-xs mt-1">11:45</span>
</div>
<div class="flex flex-col justify-center flex-1">
<p class="text-slate-900 dark:text-white font-bold text-base">Computer Networks</p>
<div class="flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[16px] text-slate-400">location_on</span>
<p class="text-slate-500 dark:text-slate-400 text-sm">Lab 504 • Tech Wing</p>
</div>
</div>
</div>
<!-- Empty State Example (Hidden by default but available for UI context) -->
<!-- 
                <div class="flex flex-col items-center justify-center py-12 px-6 text-center bg-slate-100/50 dark:bg-slate-900/50 rounded-xl border-2 border-dashed border-slate-200 dark:border-slate-800">
                    <span class="material-symbols-outlined text-4xl text-slate-300 mb-2">event_available</span>
                    <p class="text-slate-600 dark:text-slate-400 font-medium">No classes today, enjoy your time!</p>
                </div> 
                -->
</section>
<!-- Action Buttons -->
<section class="grid grid-cols-2 gap-4 pt-2">
<button class="col-span-2 flex items-center justify-center gap-3 bg-primary text-white py-4 px-6 rounded-xl font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-95"><span class="material-symbols-outlined">cloud_download</span>导入课表</button>
<button class="flex items-center justify-center gap-2 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 py-4 px-4 rounded-xl font-semibold border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95"><span class="material-symbols-outlined text-primary">add_circle</span>手动添加</button>
<button class="flex items-center justify-center gap-2 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 py-4 px-4 rounded-xl font-semibold border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95"><span class="material-symbols-outlined text-primary">edit_calendar</span>调整</button>
</section>
<!-- Learning Progress Card -->
<section class="rounded-xl bg-primary/5 border border-primary/10 p-4">
<div class="flex justify-between items-center mb-3">
<h3 class="font-bold text-slate-800 dark:text-slate-200">学期进度</h3>
<span class="text-xs font-bold text-primary">第 8 / 18 周</span>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full w-[45%]"></div>
</div>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="sticky bottom-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm px-6 pb-6 pt-3 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
<span class="text-[10px] font-bold">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">calendar_month</span>
<span class="text-[10px] font-medium">课表</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">我的</span>
</a>
</nav>
</div>
</body></html>
